project:
  type: website
  output-dir: docs

website:
  title: "Gong Lab"
  description: "The Gong Lab at Yale — AI, clinical informatics, and evidence-driven oncology research"
  site-url: https://ctrltrial.github.io/gong-lab/
  favicon: images/favicon.png
  navbar:
    background: primary
    logo: images/yale-logo.png
    logo-alt: "Yale"
    logo-href: index.qmd
    left:
      - href: index.qmd
        text: Home
      - people.qmd
      - research.qmd
      - publications.qmd
      - projects.qmd
      - news.qmd
      - join.qmd
      - contact.qmd
  page-footer:
    center: "The Gong Lab · Yale School of Medicine · Yale Cancer Center"

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    include-in-header:
      - text: |
          <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
          <meta http-equiv="Pragma" content="no-cache">
          <meta http-equiv="Expires" content="0">
          <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
